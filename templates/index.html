<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x8 Table</title>
    <script src="static/js/logic.js"></script>
    <style>
        .fixed-table {
            table-layout: fixed; /* Don't resize table cells when changing dimensions*/
            width: 640px;
            border-collapse: collapse;
        }
        
        .fixed-table td, .fixed-table th {
            width: 80px;
            height: 10px;
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid #000;
        }

        /* Circle elements with pointer */
        td.numberable {
            display: inline-block;
            width: 25px;
            height: 25px;
            line-height: 25px;
            border-radius: 50%;
            background-color: black;
            color: white;
            text-align: center;
            font-weight: bold;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <table class="fixed-table">
        <!-- Good practice but otherwise no need to be seen -->
        <thead>
            <tr style="display: none;">
                <th></th>
                <th></th>
                <th></th>
                <th></th>
                <th></th>
                <th></th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <!-- Row 1 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>
            
            <!-- Row 2 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>

            <!-- Row 3 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>

            <!-- Row 4 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>

            <!-- Row 5 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>
            
            <!-- Row 6 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>

            <!-- Row 7 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>

            <!-- Row 8 -->
            <tr>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
                <td class="numberable"></td>
            </tr>
        </tbody>
    </table>

    <div class="options">
        Table size select:
        <label>
            <input type="radio" name="choice" value="5x5" onclick="setDimensions(5)"> 5x5
        </label>
        <label>
            <input type="radio" name="choice" value="6x6" onclick="setDimensions(6)" checked> 6x6 (default)
        </label>
        <label>
            <input type="radio" name="choice" value="7x7" onclick="setDimensions(7)"> 7x7
        </label>
        <label>
            <input type="radio" name="choice" value="8x8" onclick="setDimensions(8)"> 8x8
        </label>
    </div>
</body>
</html>
